workflow: GitHubFlow/v1

assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
tag-prefix: 'v'
commit-message-incrementing: Enabled

major-version-bump-message: "^(feat|fix|refactor|perf|revert)(\\([\\w\\s-]*\\))?(!:|:.*\\n\\n((.+\\n)+\\n)?BREAKING CHANGE:\\s.+)"
minor-version-bump-message: "^(feat)(\\([\\w\\s-]*\\))?:"
patch-version-bump-message: "^(fix|perf|revert)(\\([\\w\\s-]*\\))?:"
no-bump-message: "\\+semver:\\s?(none|skip)"

branches:
  main:
    regex: '^main$'
    mode: ContinuousDeployment
    label: ''
    increment: Patch
    prevent-increment:
      when-current-commit-tagged: true
    is-main-branch: true

  feature:
    regex: '^(features?|feat)[/-]'
    mode: ContinuousDelivery
    label: '{BranchName}'
    increment: Minor
    source-branches:
      - main

  pull-request:
    regex: '^(pull|pull-requests|pr)[/-]'
    mode: ContinuousDelivery
    label: 'PullRequest{Number}'
    increment: Patch
    source-branches:
      - main

ignore:
  sha: []
