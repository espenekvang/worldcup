# GitHub Actions CI/CD Pipeline — Build and Deploy to Azure Container Apps
#
# Required GitHub repository secrets:
#   AZURE_CREDENTIALS      — Azure service principal JSON (from `az ad sp create-for-rbac --sdk-auth`)
#   ACR_NAME               — ACR resource name, e.g. acrworldcup (NOT the full login server URL)
#   RESOURCE_GROUP         — Azure resource group name, e.g. rg-worldcup
#   CONTAINER_APP_NAME     — Container App name, e.g. ca-worldcup
#   VITE_GOOGLE_CLIENT_ID  — Google OAuth client ID (baked into frontend JS bundle at build time)

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Calculate version with GitVersion
        id: gitversion
        run: |
          version_json=$(dotnet dotnet-gitversion /output json)
          echo "$version_json"
          semver=$(echo "$version_json" | jq -r '.SemVer')
          major_minor_patch=$(echo "$version_json" | jq -r '.MajorMinorPatch')
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "major_minor_patch=$major_minor_patch" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image worldcup:${{ steps.gitversion.outputs.semver }} \
            --image worldcup:${{ steps.gitversion.outputs.semver }}-${SHORT_SHA} \
            --image worldcup:latest \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            --build-arg VITE_APP_VERSION=${{ steps.gitversion.outputs.semver }} \
            .

      - name: Deploy to Container App
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --container-name worldcup \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/worldcup:${{ steps.gitversion.outputs.semver }}-${SHORT_SHA}

      - name: Update ingress target port to app port
        run: |
          az containerapp ingress update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --target-port 8080
